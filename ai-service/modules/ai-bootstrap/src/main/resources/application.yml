spring:
  application:
    name: ai-service

  profiles:
    default: dev

  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL:jdbc:postgresql://localhost:${DB_PORT:5434}/${DB_NAME:postgres}}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
    hikari:
      pool-name: ai-service-hikari
      maximum-pool-size: ${DB_POOL_MAX:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
      connection-timeout: ${DB_CONN_TIMEOUT_MS:10000}
      validation-timeout: ${DB_VALID_TIMEOUT_MS:3000}
      idle-timeout: ${DB_IDLE_TIMEOUT_MS:600000}
      max-lifetime: ${DB_MAX_LIFETIME_MS:1800000}
      initialization-fail-timeout: 0

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false

  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
    vectorstore:
      pgvector:
        initialize-schema: ${PGVECTOR_INIT_SCHEMA:true}
        index-type: ${PGVECTOR_INDEX_TYPE:HNSW}
        distance-type: ${PGVECTOR_DISTANCE:COSINE_DISTANCE}

server:
  port: ${AI_SERVICE_PORT:8091}
  shutdown: graceful

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

springdoc:
  api-docs:
    enabled: ${SPRINGDOC_ENABLED:true}
  swagger-ui:
    enabled: ${SPRINGDOC_ENABLED:true}

security:
  jwt:
    enabled: ${JWT_ENABLED:false}

logging:
  level:
    root: INFO
    com.solveria: INFO
  file:
    name: ${LOG_FILE:${user.dir}/.runtime/logs/ai-service.log}
