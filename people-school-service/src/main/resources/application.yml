spring:
  application:
    name: people-school-service
  datasource:
    url: ${PEOPLE_SCHOOL_DATASOURCE_URL:jdbc:postgresql://localhost:5432/person_registry}
    username: ${PEOPLE_SCHOOL_DATASOURCE_USERNAME:person_registry}
    password: ${PEOPLE_SCHOOL_DATASOURCE_PASSWORD:person_registry}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${PEOPLE_SCHOOL_REDIS_HOST:localhost}
      port: ${PEOPLE_SCHOOL_REDIS_PORT:6379}

server:
  port: ${PEOPLE_SCHOOL_SERVER_PORT:8082}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

people-school:
  security:
    jwt:
      secret: ${IAM_JWT_SECRET:dev-secret-key-change-me-please-32-bytes-minimum}
      issuer: ${IAM_JWT_ISSUER:iam-service}
      revocation:
        enabled: ${PEOPLE_SCHOOL_JWT_REVOCATION_ENABLED:true}
        redis-key-prefix: ${IAM_ACCESS_TOKEN_REVOCATION_PREFIX:iam:blacklist:access:}
        fail-open-on-redis-error: ${PEOPLE_SCHOOL_JWT_REVOCATION_FAIL_OPEN:false}
