services:
  iam-postgres:
    image: postgres:16-alpine
    container_name: iam-postgres
    environment:
      POSTGRES_DB: iam_service
      POSTGRES_USER: iam_user
      POSTGRES_PASSWORD: iam_password
    ports:
      - "5432:5432"
    volumes:
      - iam-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iam_user -d iam_service"]
      interval: 10s
      timeout: 5s
      retries: 10

  iam-redis:
    image: redis:7-alpine
    container_name: iam-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - iam-redis-data:/data

  iam-service:
    build:
      context: ..
      dockerfile: iam-service/Dockerfile
    container_name: iam-service
    depends_on:
      iam-postgres:
        condition: service_healthy
      iam-redis:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
      IAM_DB_URL: jdbc:postgresql://iam-postgres:5432/iam_service
      IAM_DB_USERNAME: iam_user
      IAM_DB_PASSWORD: iam_password
      IAM_REDIS_HOST: iam-redis
      IAM_REDIS_PORT: 6379
      IAM_JWT_ISSUER: iam-service
      IAM_JWT_SECRET: dev-secret-key-change-me-please-32-bytes-minimum
      IAM_ACCESS_TOKEN_MINUTES: 15
      IAM_REFRESH_TOKEN_DAYS: 7
    ports:
      - "8080:8080"

volumes:
  iam-postgres-data:
  iam-redis-data:
